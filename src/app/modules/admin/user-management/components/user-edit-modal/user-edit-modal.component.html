<!-- Modal -->
<div
  *ngIf="open"
  id="userEditModal"
  tabindex="-1"
  aria-hidden="true"
  class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50"
>
  <div class="relative w-full max-w-3xl p-4">
    <!-- Modal content -->
    <div class="relative bg-white dark:bg-gray-800 rounded-lg shadow-lg h-[403px] overflow-auto">
      <!-- Modal header -->
      <div class="flex items-start justify-between p-4 border-b rounded-t border-gray-200 dark:border-gray-600">
        <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
          Editar Usuário
        </h3>
        <button
          type="button"
          class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 dark:hover:bg-gray-700 dark:hover:text-white rounded-lg text-sm p-1.5 ml-auto inline-flex items-center"
          (click)="close()"
        >
          <svg
            aria-hidden="true"
            class="w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
              clip-rule="evenodd"
            ></path>
          </svg>
          <span class="sr-only">Fechar modal</span>
        </button>
      </div>

      <!-- Modal body -->
      <div class="p-6 space-y-3">
        <!-- STEPPER -->
        <ol
          class="flex items-center w-full text-sm font-medium text-center text-gray-500 dark:text-gray-400 sm:text-base"
        >
          <li
            [ngClass]="{
              'text-blue-600 dark:text-blue-400': currentStep === 1,
              'text-gray-400 dark:text-gray-600': currentStep !== 1
            }"
            class="flex md:w-full items-center after:w-full after:h-1 after:border-b after:border-gray-200 after:mx-6 dark:after:border-gray-700"
          >
            <span class="flex items-center">
              <span class="me-2">1</span>
              Informações Pessoais
            </span>
          </li>
          <li
            [ngClass]="{
              'text-blue-600 dark:text-blue-400': currentStep === 2,
              'text-gray-400 dark:text-gray-600': currentStep !== 2
            }"
            class="flex md:w-full items-center after:w-full after:h-1 after:border-b after:border-gray-200 after:mx-6 dark:after:border-gray-700"
          >
            <span class="flex items-center">
              <span class="me-2">2</span>
              Conta
            </span>
          </li>
        </ol>

        <!-- ETAPA 1 -->
        <form
          *ngIf="currentStep === 1"
          [formGroup]="formStep1"
          class="mt-6 space-y-4"
        >
          <div class="grid gap-4 sm:grid-cols-2">
            <input
              autocomplete="off"
              formControlName="name"
              type="text"
              placeholder="Nome completo"
              class="input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />
            <input
              autocomplete="off"
              formControlName="email"
              type="email"
              placeholder="Email"
              [readonly]="true"
              class="input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />
            <input
              autocomplete="off"
              formControlName="phone"
              type="tel"
              placeholder="Telefone"
              class="input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />

            <select
              formControlName="role"
              class="input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            >
              <option value="PRODUCER">Vendedor</option>
              <option value="AFFILIATE">Afiliado</option>
            </select>

            <input
              autocomplete="off"
              formControlName="address"
              type="text"
              placeholder="Endereço"
              class="sm:col-span-2 input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />
          </div>

          <div class="flex justify-end">
            <button type="button" (click)="goToStep2()" class="btn-primary">
              Próxima etapa
            </button>
          </div>
        </form>

        <!-- ETAPA 2 -->
        <form
          *ngIf="currentStep === 2"
          [formGroup]="formStep2"
          class="mt-6 space-y-4"
        >
          <div class="grid gap-4 sm:grid-cols-2">
            <input
              autocomplete="off"
              formControlName="email"
              type="email"
              readonly
              class="input bg-gray-100 dark:bg-gray-600 dark:text-white dark:border-gray-500"
            />
            <input
              autocomplete="off"
              formControlName="password"
              type="password"
              placeholder="Nova senha (deixe em branco para manter a atual)"
              class="input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />
            <input
              autocomplete="off"
              formControlName="confirmPassword"
              type="password"
              placeholder="Confirmar nova senha"
              class="input dark:bg-gray-700 dark:text-white dark:border-gray-600"
            />
          </div>

          <div class="flex justify-between">
            <button type="button" (click)="goToStep1()" class="btn-secondary">
              Voltar
            </button>
            <button type="submit" (click)="onSubmit()" class="btn-primary">
              Salvar alterações
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
