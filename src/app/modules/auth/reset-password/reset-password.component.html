<section class="bg-gray-50 dark:bg-gray-900">
  <div
    class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0"
  >
    <div>
      <img
        src="assets/img/logo_h.png"
        class="mb-8 block dark:hidden w-[150px] md:w-60"
        alt="Logo kursinha"
      />
      <img
        src="assets/img/logo_v.png"
        class="mb-8 hidden dark:block w-[150px] md:w-60"
        alt="Logo kursinha"
      />
    </div>

    <div
      class="w-full p-6 bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md dark:bg-gray-800 dark:border-gray-700 sm:p-8"
    >
      <h2
        class="mb-1 text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white"
      >
        Alterar a senha
      </h2>

      <form
        class="mt-4 space-y-4 lg:mt-5 md:space-y-5"
        [formGroup]="confirmForm"
        (ngSubmit)="onConfirmReset()"
      >
        <div>
          <label
            for="password"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Nova senha</label
          >
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="••••••••"
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
          />
          <small
            class="text-red-500"
            *ngIf="
              confirmForm.get('password')?.invalid &&
              confirmForm.get('password')?.touched
            "
          >
            Mínimo de 6 caracteres.
          </small>
        </div>

        <div class="block pb-4">
          <label
            for="confirm-password"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Confirmar a nova senha</label
          >
          <input
            type="password"
            id="confirm-password"
            formControlName="confirmPassword"
            placeholder="••••••••"
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
          />
          <small
            class="text-red-500"
            *ngIf="
              !passwordsMatch() && confirmForm.get('confirmPassword')?.touched
            "
          >
            As senhas não conferem.
          </small>
        </div>

        <app-button
          text="Resetar a senha"
          type="submit"
          [fullWidth]="true"
          [isLoading]="isLoading"
          [disabled]="confirmForm.invalid || !passwordsMatch() || isLoading"
        ></app-button>
      </form>
    </div>
  </div>
</section>
