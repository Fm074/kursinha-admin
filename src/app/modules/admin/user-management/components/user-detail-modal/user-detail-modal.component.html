<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
>
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg max-w-2xl w-full p-6">
    <!-- Header -->
    <div class="flex justify-between items-center border-b pb-4 mb-4 border-gray-200 dark:border-gray-700">
      <h2 class="text-xl font-semibold text-gray-900 dark:text-white">
        Verificação de Documentos
      </h2>
      <button
        type="button"
        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
        (click)="close.emit()"
      >
        ✕
      </button>
    </div>

    <!-- Informações do Usuário -->
    <div class="mb-4">
      <p class="text-sm text-gray-700 dark:text-gray-300">
        <strong>Nome:</strong> {{ user?.name }} <br />
        <strong>Email:</strong> {{ user?.email }}
      </p>
    </div>

    <!-- Lista de Documentos -->
    <div>
      <h3 class="text-md font-medium text-gray-800 dark:text-gray-100 mb-2">
        Documentos enviados:
      </h3>
      <div
        *ngIf="user?.documents?.length > 0; else noDocs"
        class="grid grid-cols-1 sm:grid-cols-2 gap-4"
      >
        <div
          *ngFor="let doc of user.documents"
          class="relative group rounded overflow-hidden border border-gray-200 dark:border-gray-600 shadow-sm"
        >
          <a
            [href]="doc"
            target="_blank"
            rel="noopener noreferrer"
            class="block"
          >
            <!-- Imagem do documento -->
            <img
              [src]="doc"
              alt="Documento"
              class="w-full h-48 object-cover transition-transform duration-200 group-hover:scale-105"
            />

            <!-- Ícone de olho -->
            <div class="absolute size-9 top-2 right-2 bg-white/80 dark:bg-gray-700/80 rounded-md flex items-center justify-center">
              <span class="material-symbols-rounded text-gray-700 dark:text-gray-200 text-lg">
                visibility
              </span>
            </div>
          </a>
        </div>
      </div>
      <ng-template #noDocs>
        <p class="text-sm text-gray-500 dark:text-gray-400">Nenhum documento enviado.</p>
      </ng-template>
    </div>

    <!-- Ações -->
    <div class="mt-6 flex justify-end gap-3">
      <button
        class="text-white bg-green-600 hover:bg-green-700 font-medium rounded-lg text-sm px-4 py-2"
        (click)="approve()"
      >
        Aprovar
      </button>
      <button
        class="text-white bg-red-600 hover:bg-red-700 font-medium rounded-lg text-sm px-4 py-2"
        (click)="reject()"
      >
        Reprovar
      </button>
    </div>
  </div>
</div>
