<div class="maintenance-banner" role="status" aria-live="polite">
  <div class="maintenance-icon" aria-hidden="true">⚠️</div>
  <div class="maintenance-content">
    <p class="maintenance-title">⚠️ Aviso Importante</p>
    <p class="maintenance-message">
      “Hoje, das 20h às 23h, a plataforma passará por uma grande atualização.<br />
      Durante esse período, alguns recursos podem ficar temporariamente indisponíveis.<br />
      Recomendamos que você salve seu trabalho antes desse horário.”
    </p>
  </div>
  <button class="maintenance-action" type="button" (click)="onAcknowledge()">Entendi</button>
</div>
